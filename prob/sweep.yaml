program: probe.py
project: scfoundation-probe
method: grid
metric:
  goal: maximize
  name: cv_test/macro_f1

parameters:
  dataset_id:
    values:
       - 5w_GSE196830
       - GSE96583
       - 10w_GSE196830
       - 20w_GSE196830
       - 40w_GSE196830
       - 80w_GSE196830
       - 120w_GSE196830

# Fixed args passed to every run.
# ${args} expands to --dataset_id <value> for each trial.
command:
  - /lichaohan/miniconda3/envs/scvi/bin/python
  - ${program}
  - --ckpt
  - /lichaohan/scFoundation/model/models/models.ckpt
  - --gene_index
  - /lichaohan/scFoundation/OS_scRNA_gene_index.19264.tsv
  - --symbol_map
  - /lichaohan/readData/gene_id_to_symbol.tsv
  - --wandb_project
  - scfoundation-probe
  - --batch_size
  - "4"
  - --n_jobs
  - "16"
  - --save_embeddings
  - ${args}
